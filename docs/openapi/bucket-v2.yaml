              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        type: object
                        properties:
                          count:
                            type: integer
                            format: int64

  /buckets/trash:
    get:
      tags: [Buckets]
      summary: List soft-deleted buckets
      operationId: listDeletedBuckets
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: Paginated list of deleted buckets
          content:
