openapi: 3.0.3
info:
  title: Bucket Module API
  description: |
    File storage and management API for the Backbone Framework.

    V2.0 provides enhanced file storage with media processing, collaboration,
    deduplication, CDN support, and multipart uploads.

    ## Authentication
    All endpoints require JWT authentication via Bearer token:
    ```
    Authorization: Bearer <jwt_token>
    ```

    ## Common Query Parameters
    All list endpoints support:
    - `page` (integer, default: 1) - Page number
    - `per_page` (integer, default: 20, max: 100) - Items per page
    - `sort` (string) - Sort field name
    - `order` (string: asc|desc) - Sort direction
    - `search` (string) - Full-text search query

    ## Entities (13)
    - **Bucket** - Storage containers
    - **StoredFile** - File records with scanning and CDN
    - **FileVersion** - File version history
    - **FileShare** - File sharing (link, user, password)
    - **FileLock** - Concurrent edit prevention
    - **FileComment** - File commenting and annotations
    - **ContentHash** - Content deduplication hashes
    - **UploadSession** - Multipart upload sessions
    - **ConversionJob** - File format conversion
    - **ProcessingJob** - Background processing tasks
    - **Thumbnail** - Generated thumbnail metadata
    - **UserQuota** - Per-user storage quotas
    - **AccessLog** - File access audit trail

    ## Custom Services (7)
    - **LockingService** - File editing lock management
    - **DeduplicationService** - Content-hash based dedup
    - **MultipartUploadService** - Chunked upload lifecycle
    - **ConversionService** - File format conversion pipeline
    - **CdnService** - CDN URL generation and caching
    - **VideoThumbnailService** - Video thumbnail generation
    - **DocumentPreviewService** - Document preview generation
  version: 2.0.0
  contact:
    name: Backbone Framework
  license:
    name: Proprietary

servers:
  - url: http://localhost:3000/api/v1
    description: Development
  - url: "{protocol}://{host}/api/v1"
    description: Custom
    variables:
      protocol:
        default: https
        enum: [http, https]
      host:
        default: localhost:3000

tags:
  - name: Buckets
    description: Storage bucket management
  - name: StoredFiles
    description: File storage and retrieval
  - name: FileVersions
    description: File version history
  - name: FileShares
    description: File sharing and collaboration
  - name: FileLocks
    description: File locking for concurrent editing
  - name: FileComments
    description: File commenting and annotations
  - name: ContentHashes
    description: Content deduplication
  - name: UploadSessions
    description: Multipart upload management
  - name: ConversionJobs
    description: File format conversion
  - name: ProcessingJobs
    description: Background processing tasks
  - name: Thumbnails
    description: Generated thumbnail metadata
  - name: UserQuotas
    description: Per-user storage quotas
  - name: AccessLogs
    description: File access audit trail

# ===========================================================================
# Paths
# ===========================================================================
paths:
  # -------------------------------------------------------------------------
  # Buckets
  # -------------------------------------------------------------------------
  /buckets:
    get:
      tags: [Buckets]
      summary: List buckets
      operationId: listBuckets
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
        - $ref: "#/components/parameters/SortParam"
        - $ref: "#/components/parameters/OrderParam"
        - $ref: "#/components/parameters/SearchParam"
      responses:
        "200":
          description: Paginated list of buckets
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Bucket"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Buckets]
      summary: Create a bucket
      operationId: createBucket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBucket"
      responses:
        "201":
          description: Bucket created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/Bucket"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /buckets/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    get:
      tags: [Buckets]
      summary: Get bucket by ID
      operationId: getBucket
      responses:
        "200":
          description: Bucket details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/Bucket"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Buckets]
      summary: Update bucket (full replace)
      operationId: updateBucket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBucket"
      responses:
        "200":
          description: Bucket updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/Bucket"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Buckets]
      summary: Partial update bucket
      operationId: patchBucket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchBucket"
      responses:
        "200":
          description: Bucket partially updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/Bucket"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Buckets]
      summary: Soft delete bucket
      operationId: deleteBucket
      responses:
        "204":
          description: Bucket soft-deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /buckets/bulk:
    post:
      tags: [Buckets]
      summary: Bulk create buckets
      operationId: bulkCreateBuckets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
