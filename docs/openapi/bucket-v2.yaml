# ===========================================================================
# Components
# ===========================================================================
components:
  # -------------------------------------------------------------------------
  # Security Schemes
  # -------------------------------------------------------------------------
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # -------------------------------------------------------------------------
  # Parameters
  # -------------------------------------------------------------------------
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Entity UUID

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
      description: Page number

    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: Items per page

    SortParam:
      name: sort
      in: query
      schema:
        type: string
      description: Sort field name

    OrderParam:
      name: order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: asc
      description: Sort direction

    SearchParam:
      name: search
      in: query
      schema:
        type: string
      description: Full-text search query

  # -------------------------------------------------------------------------
  # Responses
  # -------------------------------------------------------------------------
  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Conflict:
      description: Resource conflict (duplicate)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  # -------------------------------------------------------------------------
  # Schemas
  # -------------------------------------------------------------------------
  schemas:
    # --- Common ---
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        meta:
          $ref: "#/components/schemas/ResponseMeta"

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

    ResponseMeta:
      type: object
      properties:
        pagination:
          type: object
          properties:
            page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer
              format: int64
            total_pages:
              type: integer

    AuditMetadata:
      type: object
      description: Audit metadata stored as JSONB
      properties:
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
        updated_by:
          type: string
          format: uuid
        deleted_by:
          type: string
          format: uuid

    # --- Enums ---
    BucketType:
      type: string
      enum: [user, shared, system, temp]

    BucketStatus:
      type: string
      enum: [active, readonly, archived, deleted]

    StorageBackend:
      type: string
      enum: [local, s3, minio, gcs]

    HashAlgorithm:
      type: string
      enum: [sha256, md5, xxhash]

    ConversionStatus:
      type: string
      enum: [pending, processing, completed, failed]

    ConversionType:
      type: string
      enum: [image_to_image, document_to_pdf, video_to_video, audio_to_audio]

    CommentStatus:
      type: string
      enum: [active, resolved, deleted, archived]

    LockStatus:
      type: string
      enum: [active, expired, released]

    ShareType:
      type: string
      enum: [user, link, password]

    ShareStatus:
      type: string
      enum: [active, expired, exhausted, revoked]

    SharePermission:
      type: string
      enum: [private, view, edit, full]

    VersionType:
      type: string
      enum: [upload, replace, edit, restore, auto_save]

    ProcessingJobType:
      type: string
      enum: [thumbnail_generation, video_thumbnail, document_preview, compression, virus_scan, deduplication_check]

    JobStatus:
      type: string
      enum: [pending, running, completed, failed, cancelled]

    FileStatus:
      type: string
      enum: [uploading, processing, active, quarantined, deleted, purged]

    ThreatLevel:
      type: string
      enum: [safe, low, medium, high, critical]

    AccessAction:
      type: string
      enum: [download, view, preview]

    ProcessingStatus:
      type: string
      enum: [pending, processing, thumbnails_ready, scan_complete, complete, failed]

    ThumbnailSize:
      type: string
      enum: [tiny, small, medium, large, xlarge]

    UploadStatus:
      type: string
      enum: [initiated, uploading, completing, completed, expired, failed]

    QuotaStatus:
      type: string
      enum: [normal, exceeded]

    # --- Entity: Bucket ---
    Bucket:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        owner_id:
          type: string
          format: uuid
        bucket_type:
          $ref: "#/components/schemas/BucketType"
        status:
          $ref: "#/components/schemas/BucketStatus"
        storage_backend:
          $ref: "#/components/schemas/StorageBackend"
        root_path:
          type: string
        file_count:
          type: integer
          format: int32
        total_size_bytes:
          type: integer
          format: int64
        max_file_size:
          type: integer
          format: int64
          nullable: true
        allowed_mime_types:
          type: array
          items:
            type: string
        auto_delete_after_days:
          type: integer
          format: int32
          nullable: true
        enable_cdn:
          type: boolean
        enable_versioning:
          type: boolean
        enable_deduplication:
          type: boolean
        metadata:
          $ref: "#/components/schemas/AuditMetadata"

    CreateBucket:
      type: object
