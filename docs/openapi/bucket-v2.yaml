                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Bucket"

  /buckets/trash/count:
    get:
      tags: [Buckets]
      summary: Count deleted buckets
      operationId: countDeletedBuckets
      responses:
        "200":
          description: Count of deleted buckets
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
