[package]
name = "backbone-bucket"
version = "0.1.3"
edition = "2021"
description = "Bucket Bounded Context: File Storage Module for Backbone Framework"

[lib]
path = "src/lib.rs"

[dependencies]
# Backbone Framework CORE dependencies
backbone-core = { git = "https://github.com/faridlab/backbone-framework", tag = "v2.1.1", features = ["postgres"] }
backbone-orm = { git = "https://github.com/faridlab/backbone-framework", tag = "v2.1.1" }
backbone-auth = { git = "https://github.com/faridlab/backbone-framework", tag = "v2.1.1" }
backbone-messaging = { git = "https://github.com/faridlab/backbone-framework", tag = "v2.1.1" }

# Core dependencies
tokio = { version = "1.0", features = ["full"] }
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
rust_decimal = { version = "1.36", features = ["serde"] }

# Database (PostgreSQL Primary)
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json", "migrate", "rust_decimal"] }

# Protocol Buffers (Generated from Schema-First YAML)
tonic = "0.12"
prost = "0.13"
prost-types = "0.13"
pbjson = "0.7"

# Validation
validator = { version = "0.16", features = ["derive"] }

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Validation helpers
regex = "1.0"

# Password hashing (for @hashed fields)
bcrypt = "0.16"

# Cryptographic signing (CDN signed URLs)
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"

# Mode-B serving + ObjectStorage trait
bytes = "1.5"
url = { version = "2.5", features = ["serde"] }

# AWS SigV4 signing (feature-gated via `s3`)
aws-config = { version = "1.5", features = ["behavior-version-latest"], optional = true }
aws-sdk-s3 = { version = "1.60", optional = true }
aws-credential-types = { version = "1.2", optional = true }

# Random generation
rand = "0.8"

# Image processing
image = "0.24"

# HTTP Framework (Axum)
axum = { version = "0.7", features = ["macros"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }

# Configuration
config = "0.14"
serde_yaml = "0.9"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# GraphQL (optional)
async-graphql = { version = "7", optional = true }

[features]
default = ["s3"]
events = []
auth = []
grpc = []
openapi = []
validation = []
graphql = ["dep:async-graphql"]
# S3/MinIO backend via aws-sdk-s3 (real SigV4).
s3 = ["dep:aws-config", "dep:aws-sdk-s3", "dep:aws-credential-types"]

[build-dependencies]
tonic-build = "0.12"

[dev-dependencies]
tempfile = "3.0"
tokio-test = "0.4"
mockall = "0.12"
pretty_assertions = "1.0"

# Integration testing framework
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }
jsonwebtoken = "9.3"
rand = "0.8"

# Property-based testing
proptest = "1.4"
