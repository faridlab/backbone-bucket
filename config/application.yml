server:
  host: 0.0.0.0
  port: 3000
  grpc_port: 50051
database:
  url: postgresql://postgres:password@localhost:5432/backbonedb
  max_connections: 20
  min_connections: 5
  connect_timeout: 30
  idle_timeout: 600
module:
  name: bucket
  enabled: true
features:
  soft_delete: true
  state_machines: true
  workflows: true
entities:
  access_log:
    collection: access_logs
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  bucket:
    collection: buckets
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  content_hash:
    collection: content_hashes
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  conversion_job:
    collection: conversion_jobs
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  file_comment:
    collection: file_comments
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  file_lock:
    collection: file_locks
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  file_share:
    collection: file_shares
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  file_version:
    collection: file_versions
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  processing_job:
    collection: processing_jobs
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  stored_file:
    collection: stored_files
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  file_access_log:
    collection: file_access_logs
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  thumbnail:
    collection: thumbnails
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  upload_session:
    collection: upload_sessions
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  user_quota:
    collection: user_quotas
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
logging:
  level: info
  format: json
  file: logs/bucket.log
tracing:
  enabled: true
  exporter: otlp
  endpoint: http://localhost:4317
metrics:
  enabled: true
  endpoint: /metrics
  port: 9090
